<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>North Pole Nordic</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #0a2540;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>North Pole Nordic</h1>
  <p>Smart snöpinnar för säkrare vägar</p>
</header>

<section>
  <h2>Om produkten</h2>
  <p>
    Våra snöpinnar förbättrar synlighet och minskar olyckor genom smart design och dataanalys.
  </p>
</section>

<section>
  <h2>Lägg till potentiell kund</h2>

  <input id="name" placeholder="Företag / Kommun">
  <input id="email" placeholder="Email">
  <button onclick="addCustomer()">Spara</button>

  <div id="customerList"></div>
</section>

<script>
  let customers = [];

  function addCustomer() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const customer = { name, email };
    customers.push(customer);

    renderCustomers();
  }

  function renderCustomers() {
    const list = document.getElementById("customerList");
    list.innerHTML = "";

    customers.forEach(c => {
      list.innerHTML += `
        <div class="card">
          <strong>${c.name}</strong><br>
          ${c.email}
        </div>
      `;
    });
  }
</script>

</body>
</html>
